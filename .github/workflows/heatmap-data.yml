name: Fetch Heatmap Data

on:
  schedule:
    # Weekdays, market open (9:30 AM ET) through 7:30 PM ET, every 5 minutes.
    # GitHub cron is UTC, so cover both EDT (UTC-4) and EST (UTC-5):
    # 13:30 UTC → 00:30 UTC next day. The edges overshoot by an hour in one
    # DST regime or the other; the fetch script knows actual market hours.
    - cron: '30,35,40,45,50,55 13 * * 1-5'
    - cron: '*/5 14-23 * * 1-5'
    - cron: '0,5,10,15,20,25,30 0 * * 2-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Fetch heatmap data
        run: npm run fetch-data

      - name: Check if data changed
        id: diff
        run: |
          git diff --quiet public/data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git commit -m "chore: update heatmap data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
